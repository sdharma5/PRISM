# PRISM speech symptom lexicon.
#
# WHY A LEXICON RATHER THAN A MODEL: the default extractor must be auditable and
# fully deterministic. A clinician reviewing a flagged extraction has to be able
# to point at the exact line that produced it. An LLM extractor may be plugged in
# later (see LlmExtractor), but it is held to the same evidence-span contract.
#
# CONTRACT FOR EVERY CONCEPT ENTRY
#   code:        canonical variable code from registry/variables.yaml, or null
#                when the registry has no patient-level variable for it. A null
#                code is NEVER invented: the mention is recorded as unmapped.
#   family_code: the code to use when the mention is attributed to a relative.
#                A concept with no family_code can never become a family event.
#   value:       the value asserted by a non-negated mention (default true).
#   phrases:     surface forms, matched as whole-token sequences (case-insensitive).
#
# WHY code IS NULL FOR pmos AND diabetes: `pmos_binary` is a *dataset-provided
# label*, not a patient self-report, and there is no patient diabetes-diagnosis
# variable in the registry. Mapping "I have PMOS" onto the label column would
# contaminate every evaluation that uses that label as ground truth. So the
# mention is surfaced as unmapped, while "my mother has PMOS" maps cleanly onto
# family_history_pmos.

