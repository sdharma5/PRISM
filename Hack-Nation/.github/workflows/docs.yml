name: Docs

on:
  push:
    branches: [main]
  pull_request:
    paths: ["docs/**", "mkdocs.yml", "README.md", "TRAINING.md", ".github/workflows/docs.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[docs,dev]"
      # --strict turns a broken link or a missing nav page into a failure.
      - name: Build
        run: mkdocs build --strict
      - name: Generated docs are not stale
        run: python scripts/update_repo_docs.py --check
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    # Pages deployment requires Pages to be enabled on the repository
    # (Settings > Pages > Source: GitHub Actions). Until then this is skipped
    # rather than failing the workflow.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
