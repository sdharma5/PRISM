name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    name: Build and publish release notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]" build

      - name: Full CI gate before release
        run: |
          ruff check .
          pytest tests/unit tests/contract tests/integration
          python scripts/validate_registry.py

      - name: Build distribution
        run: python -m build

      # Release notes are generated from conventional-commit prefixes:
      # feat: fix: docs: data: model: eval: refactor: test: chore:
      - name: Generate release notes
        run: python scripts/generate_release_notes.py --output RELEASE_NOTES.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: dist/*
          draft: true
