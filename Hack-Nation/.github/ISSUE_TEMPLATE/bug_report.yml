name: Bug report
description: Report a defect
title: "fix: <short description>"
labels: ["bug", "needs-triage"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      options: [schemas, registry, ingestion, event store, features, models/tabular, models/phenotype, models/stability, models/speech, models/documents, models/ultrasound, models/temporal, PMOS adapter, training, evaluation, scripts, docs/CI]
    validations: { required: true }
  - type: input
    id: command
    attributes: { label: Command }
    validations: { required: true }
  - type: textarea
    id: config
    attributes: { label: Config, render: yaml }
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, and which optional extras are installed.
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Expected behavior }
    validations: { required: true }
  - type: textarea
    id: observed
    attributes: { label: Observed behavior }
    validations: { required: true }
  - type: textarea
    id: traceback
    attributes: { label: Traceback, render: shell }
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Use a synthetic fixture. Never paste clinical data into an issue.
    validations: { required: true }
  - type: checkboxes
    id: nodata
    attributes:
      label: Confirmation
      options:
        - label: This report contains no patient data.
          required: true
