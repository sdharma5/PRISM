      additionalProperties: false
      type: object
      required:
      - patient_id
      title: UltrasoundInferenceRequest
      description: Ultrasound branch only. Gated off; see the router for the 503 it returns.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
