          title: Supporting Evidence
        conflicting_evidence:
          items:
            $ref: '#/components/schemas/ConflictView'
          type: array
          title: Conflicting Evidence
        missing_evidence:
          items:
            type: string
          type: array
          title: Missing Evidence
        available_modalities:
          items:
            type: string
          type: array
          title: Available Modalities
        missing_modalities:
          items:
            type: string
          type: array
          title: Missing Modalities
        learned_components_used:
          items:
            type: string
          type: array
          title: Learned Components Used
        rule_based_components_used:
          items:
            type: string
          type: array
          title: Rule Based Components Used
        provenance:
