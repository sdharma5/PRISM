  # ------------------------------------------------- blueprint worked examples
  # These three utterances are quoted verbatim from the PRISM implementation
  # blueprint. They are the reference cases the extraction contract was
  # specified against, so they are pinned here and asserted individually in
  # tests/unit/test_blueprint_examples.py rather than only in aggregate metrics.
  - id: U073
    category: present
    speaker_role: patient
    text: "My periods have been between 45 and 70 days apart for about a year."
    events:
      - { code: cycle_irregularity, attribution: patient, current: true, negated: false, uncertain: false, speaker_role: patient }
      - { code: cycle_length, attribution: patient, uncertain: true, speaker_role: patient }
    notes: >-
      Blueprint worked example 1. Text is verbatim from the blueprint. Expected
      duration: approximately_12_months.
      ANNOTATION NOTE (added by the speech-pipeline implementer, NOT from the
      blueprint): the second event, cycle_length, records the midpoint of the
      stated 45-70 day range with uncertain=true and the endpoints preserved in
      value_range. It is annotated here only so this case matches U076-U079,
      which cover the same construction. The blueprint listed only
      cycle_irregularity; if the intent was that a range must NOT yield a point
      value at all, drop this line and the extractor's range-to-midpoint rule
      together.

  - id: U074
    category: historical
    speaker_role: patient
    text: "I had acne in high school, but I do not have it now."
    events:
      - { code: acne, attribution: patient, historical: true, current: false, negated: false, speaker_role: patient }
    notes: >-
      Blueprint worked example 2. Status is historical_resolved, NOT negated:
      the patient affirms the symptom occurred, then reports it resolved. A
      negation label here would erase a real past finding.

  - id: U075
    category: family_history
    speaker_role: patient
    text: "My sister has PCOS."
    events:
      - { code: family_history_pcos, attribution: family_member, relation: sister, current: false, speaker_role: patient }
    notes: >-
      Blueprint worked example 3. Must never be converted into a patient
      diagnosis.

  # ------------------------------------------------- numeric cycle expression
  # WHY THIS BLOCK EXISTS: blueprint example 1 exposed a blind spot — patients
  # state irregularity as a NUMBER far more often than as the word "irregular",
  # and a lexicon-shaped corpus never tested it. These cases exercise the
  # cycle_thresholds path in lexicon.yaml, including the cases that must NOT
  # produce an irregularity claim.

  - id: U076
    category: numeric_cycle
    speaker_role: patient
    text: "My cycles are anywhere from 30 to 60 days."
    events:
      - { code: cycle_irregularity, attribution: patient, speaker_role: patient }
      - { code: cycle_length, attribution: patient, uncertain: true, speaker_role: patient }
    notes: "30-day spread far exceeds the 9-day variability threshold."

  - id: U077
    category: numeric_cycle
    speaker_role: patient
    text: "My periods come 45 to 70 days apart."
    events:
      - { code: cycle_irregularity, attribution: patient, speaker_role: patient }
      - { code: cycle_length, attribution: patient, uncertain: true, speaker_role: patient }

  - id: U078
    category: numeric_cycle
    speaker_role: patient
    text: "My cycles range from 28 to 32 days."
    events:
      - { code: cycle_length, attribution: patient, uncertain: true, speaker_role: patient }
    notes: >-
      A normal, tight range. It must NOT produce cycle_irregularity, and it must
      NOT produce a cycle_regularity='regular' claim either: flagging an abnormal
      number is a safe machine action, issuing a clean bill of health is not.

  - id: U079
    category: numeric_cycle
    speaker_role: clinician
    text: "She reports cycles between 21 and 55 days over the past year."
    events:
