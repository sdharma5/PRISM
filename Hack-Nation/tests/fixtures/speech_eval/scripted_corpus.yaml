  # ============================ KNOWN COVERAGE LIMITS ======================
  #
  # THESE CASES ARE EXPECTED TO FAIL. They are annotated with what a clinician
  # would record, and the current extractor recovers little or none of it.
  #
  # WHY THEY ARE IN THE CORPUS RATHER THAN ONLY IN A DOCSTRING: the first version
  # of this corpus scored 0.9933 F1 because every utterance had been written
  # within the lexicon's reach. That number measured the corpus, not the
  # extractor. These utterances deliberately sit outside it, so the headline
  # recall figure carries the cost of the gaps instead of hiding them. Recall is
  # SUPPOSED to drop here. Do not "fix" this block by deleting the gold events.
  #
  # If a limit is later closed in ingestion/speech/, the corresponding case will
  # start passing and recall will rise on its own — which is the only honest way
  # for that number to improve.

  - id: U085
    category: coverage_limit
    speaker_role: patient
    text: "I only need tampons a few times a year."
    events:
      - { code: menstrual_frequency_per_year, attribution: patient, speaker_role: patient }
    notes: >-
      LIMIT — inferential frequency. Oligomenorrhoea stated via a proxy
      behaviour, with no cycle fact ever spoken. Currently extracts nothing.

  - id: U086
    category: coverage_limit
    speaker_role: patient
