# PRISM scripted speech evaluation corpus.
#
# ============================ SYNTHETIC DATA =============================
# Every utterance below was written by hand for this repository. NONE of it is
# real patient speech, real clinician speech, or a transcription of either. It
# supports no claim about real-world performance — see
# registry/datasets.yaml -> prism_speech_eval_synthetic, which prohibits exactly
# that claim.
# =========================================================================
#
# WHY A SCRIPTED CORPUS: it separates two failure modes that a real recording
# conflates. With the transcript held fixed and known, every extraction error is
# an *extraction* error. ASR error is measured separately by WER against a real
# engine on the same scripts. A corpus that mixed them would let a good ASR
# model hide a bad negation rule.
#
# Ground-truth annotation convention:
#   code         canonical variable code the utterance asserts, or omitted when
#                the utterance asserts nothing extractable (an important case:
#                clinician questions and fertility goals must yield NO events).
#   attribution  patient | family_member  — whose finding it is.
#   negated      the speaker asserts the finding is absent.
#   historical   the finding is placed in the past and not asserted as current.
#   uncertain    the speaker hedges.
#   speaker_role who is talking, which is not the same as whose finding it is.

corpus_id: prism_speech_eval_synthetic
version: "1.0.0"
synthetic: true
language: en
source_dataset: prism_speech_eval_synthetic
notice: >-
  Fully synthetic. Contains no real patient speech. Not a clinical validation set.

