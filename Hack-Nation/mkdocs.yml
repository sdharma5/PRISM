site_name: PRISM
site_description: >-
  Personalized Reproductive and Integrated Systemic Model — a modular,
  condition-agnostic hormonal-health modeling pipeline. Research use only.
repo_url: https://github.com/AngelaNing1/Hack-Nation
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/prism.css

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Home: index.md
  - Quick start: quickstart.md
  - Concepts:
      - Event store: concepts/event_store.md
      - Provenance: concepts/provenance.md
      - Missingness: concepts/missingness.md
      - Phenotype profiles: concepts/phenotype_profiles.md
      - Trait vs state: concepts/trait_vs_state.md
  - Data contracts: contracts.md
  - Dataset registry: datasets/index.md
  - Modules:
      - Static model: modules/static_model.md
      - Phenotype domains: modules/phenotype_domains.md
      - Subtype stability: modules/subtype_stability.md
      - Speech pipeline: modules/speech.md
      - Document pipeline: modules/documents.md
      - Ultrasound pipeline: modules/ultrasound.md
      - Dynamic state: modules/temporal.md
  - Experiments: experiments/index.md
  - Model cards: model_cards.md
  - Decisions:
      - ADR-001 Event store: decisions/ADR-001-event-store.md
      - ADR-002 No fake pairing: decisions/ADR-002-no-fake-pairing.md
      - ADR-003 Subtype language: decisions/ADR-003-subtype-language.md
      - ADR-004 Human confirmation: decisions/ADR-004-human-confirmation.md
  - Contributing: contributing.md
