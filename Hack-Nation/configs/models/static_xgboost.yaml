# Gradient-boosted trees. Falls back to sklearn HistGradientBoosting with a loud
# warning when xgboost is not installed; the backend is recorded in the run log.
model:
  name: static_xgboost
  class: models.tabular.xgboost.XGBoostStaticModel
  params:
    n_estimators: 300
    max_depth: 3
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    min_child_weight: 1.0
    threshold: 0.5
    allow_fallback: true
